<!DOCTYPE html>
<html>
<head>
  <title>Vasundhara Healing Lounge</title>

  <!-- ✅ Mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f1eb;
      text-align: center;
      color: #3b2a1f;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      padding-top: 30px;
      min-height: 100vh;
      position: relative;
    }

    /* 🌿 Embedded leaf pattern (no broken links) */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233b2a1f' fill-opacity='0.05'%3E%3Cpath d='M100 20c20 30 20 60 0 90-20-30-20-60 0-90z'/%3E%3Cpath d='M50 100c30-20 60-20 90 0-30 20-60 20-90 0z'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 180px;
      z-index: -1;
    }

    .logo {
      width: 230px;
      max-width: 85%;
    }

    .tagline {
      letter-spacing: 2px;
      font-size: 13px;
      margin: 15px 0 25px;
      color: #8c6b4f;
    }

    .welcome {
      font-size: 26px;
      margin-top: 5px;
    }

    .sub {
      color: #6e5a4a;
      margin-bottom: 25px;
      font-size: 14px;
      padding: 0 20px;
    }

    .card {
      width: 90%;
      max-width: 360px;
      margin: 10px auto;
      padding: 14px;
      border-radius: 16px;
      background: #ffffff;

      display: flex;
      align-items: center;
      justify-content: space-between;

      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;

      transition: 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: scale(1.04);
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 34px;
      margin-right: 12px;
    }

    .text {
      font-size: 16px;
    }

    .arrow {
      font-size: 20px;
      color: #b08b5a;
    }

  </style>
</head>

<body>

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <!-- TAGLINE -->
  <div class="tagline">
    RELAX • REJUVINATE • HEAL
  </div>

  <!-- TEXT -->
  <div class="welcome">Welcome</div>
  <div class="sub">Choose an option below to connect with us</div>

  <!-- Instagram -->
  <a href="https://www.instagram.com/vasundhara.healing.lounge?igsh=MWNpOGtudHZ5N3RmMw==" class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
      <div class="text">Instagram</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <!-- Google -->
  <a href="https://share.google/Ocm6NvcWWnpt75Lv4" class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="icon">
      <div class="text">Google</div>
    </div>
    <div class="arrow">›</div>
  </a>

</body>
</html>
