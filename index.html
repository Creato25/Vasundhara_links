<!DOCTYPE html>
<html>
<head>
  <title>Vasundhara Healing Lounge</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 PREMIUM FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      text-align: center;
      color: #3b2a1f;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding: 30px 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 🌿 Background */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(rgba(245,241,235,0.6), rgba(245,241,235,0.6)),
        url('background.png') no-repeat center center;
      background-size: cover;
      z-index: -1;
    }

    /* Container */
    .container {
      width: 100%;
      max-width: 380px;
      padding: 0 18px;
      box-sizing: border-box;

      animation: fadeUp 0.8s ease;
    }

    /* Animation */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo {
      width: 220px;
      max-width: 85%;
      margin-bottom: 10px;
    }

    /* Tagline */
    .tagline {
      letter-spacing: 2px;
      font-size: 12px;
      margin: 10px 0 20px;
      color: #8c6b4f;
    }

    /* Headings */
    .welcome {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-top: 5px;
      font-weight: 600;
    }

    .sub {
      color: #6e5a4a;
      margin-bottom: 20px;
      font-size: 13px;
    }

    /* Cards */
    .card {
      width: 100%;
      margin: 10px 0;
      padding: 14px 16px;
      border-radius: 16px;

      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);

      display: flex;
      align-items: center;
      justify-content: space-between;

      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;

      transition: 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 32px;
      margin-right: 12px;
    }

    .text {
      font-size: 15px;
      font-weight: 500;
    }

    .arrow {
      font-size: 18px;
      color: #b08b5a;
    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="container">

    <img src="logo.png" class="logo">

    <div class="tagline">
      RELAX • REJUVINATE • HEAL
    </div>

    <div class="welcome">Welcome</div>
    <div class="sub">Choose an option below to connect with us</div>

    <!-- WhatsApp -->
    <a href="https://wa.me/918668337571?text=Hi%20I%20want%20to%20book%20a%20session%20at%20Vasundhara%20Healing%20Lounge" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="icon">
        <div class="text">WhatsApp</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- Location -->
    <a href="https://www.google.com/maps/place/Vasundhara+Healing+Lounge/@15.4935905,73.8192045,17z/data=!3m1!4b1!4m6!3m5!1s0x3bbfc179e64e9fcf:0x77bda6f426642d24!8m2!3d15.4935905!4d73.8192045!16s%2Fg%2F11n9xshp3b?entry=ttu" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="icon">
        <div class="text">Location</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- Instagram -->
    <a href="https://www.instagram.com/vasundhara.healing.lounge" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
        <div class="text">Instagram</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- Google -->
    <a href="https://share.google/Ocm6NvcWWnpt75Lv4" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="icon">
        <div class="text">Google</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

</body>
</html>
