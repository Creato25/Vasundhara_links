<!DOCTYPE html>
<html>
<head>
  <title>Vasundhara Links</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin-top: 100px;
    }
    h2 {
      margin-bottom: 40px;
    }
    button {
      padding: 15px 30px;
      margin: 15px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .insta {
      background: #E1306C;
    }
    .google {
      background: #4285F4;
    }
  </style>
</head>

<body>
  <h2>Choose where to go</h2>

  <a href="https://instagram.com/YOUR_LINK" target="_blank">
    <button class="insta">Instagram</button>
  </a>

  <a href="https://google.com" target="_blank">
    <button class="google">Google</button>
  </a>

</body>
</html>
