<!DOCTYPE html>
<html>
<head>
  <title>Vasundhara Healing Lounge</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: #3b2a1f;

      display: flex;
      justify-content: center;
      align-items: flex-start;

      padding-top: 40px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 🌿 BACKGROUND + OVERLAY */
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background:
        linear-gradient(rgba(245,241,235,0.6), rgba(245,241,235,0.6)),
        url('background.png') no-repeat center center;

      background-size: cover;
      z-index: -1;
    }

    /* ✨ Fade-in animation */
    .container {
      width: 100%;
      max-width: 420px;
      padding: 0 15px;

      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 230px;
      max-width: 85%;
      margin-bottom: 10px;
    }

    .tagline {
      letter-spacing: 2px;
      font-size: 13px;
      margin: 10px 0 25px;
      color: #8c6b4f;
    }

    .welcome {
      font-size: 26px;
      margin-top: 5px;
    }

    .sub {
      color: #6e5a4a;
      margin-bottom: 25px;
      font-size: 14px;
    }

    /* 💎 GLASS BUTTONS */
    .card {
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      border-radius: 16px;

      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);

      display: flex;
      align-items: center;
      justify-content: space-between;

      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;

      transition: 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 34px;
      margin-right: 12px;
    }

    .text {
      font-size: 16px;
    }

    .arrow {
      font-size: 20px;
      color: #b08b5a;
    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="container">

    <img src="logo.png" class="logo">

    <div class="tagline">
      RELAX • REJUVINATE • HEAL
    </div>

    <div class="welcome">Welcome</div>
    <div class="sub">Choose an option below to connect with us</div>

    <!-- Instagram -->
    <a href="https://www.instagram.com/vasundhara.healing.lounge?igsh=MWNpOGtudHZ5N3RmMw==" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
        <div class="text">Instagram</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- Google Reviews -->
    <a href="https://share.google/Ocm6NvcWWnpt75Lv4" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="icon">
        <div class="text">Google</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- 📍 Google Maps Location -->
    <a href="https://www.google.com/maps/place/Vasundhara+Healing+Lounge/@15.4935905,73.8192045,17z/data=!3m1!4b1!4m6!3m5!1s0x3bbfc179e64e9fcf:0x77bda6f426642d24!8m2!3d15.4935905!4d73.8192045!16s%2Fg%2F11n9xshp3b?entry=ttu&g_ep=EgoyMDI2MDQyMS4wIKXMDSoASAFQAw%3D%3D" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="icon">
        <div class="text">Location</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

</body>
</html>
