<!DOCTYPE html>
<html>
<head>
  <title>Vasundhara Healing Lounge</title>

  <!-- ✅ Makes it responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f1eb;
      text-align: center;
      color: #3b2a1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* 🌿 Leaf background */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://png.pngtree.com/png-clipart/20221018/original/pngtree-green-leaf-shadow-overlay-png-image_8702766.png');
      background-size: cover;
      opacity: 0.08;
      z-index: -1;
    }

    .top {
      padding-top: 20px;
    }

    .logo {
      width: 180px;
      max-width: 80%;
    }

    .tagline {
      letter-spacing: 2px;
      font-size: 13px;
      margin: 15px 0 25px;
      color: #8c6b4f;
    }

    .welcome {
      font-size: 26px;
      margin-top: 10px;
    }

    .sub {
      color: #6e5a4a;
      margin-bottom: 25px;
      font-size: 14px;
      padding: 0 20px;
    }

    .card {
      width: 90%;
      max-width: 380px;
      margin: 12px auto;
      padding: 16px;
      border-radius: 16px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      transition: 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: scale(1.04);
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 36px;
      margin-right: 12px;
    }

    .text {
      font-size: 17px;
    }

    .arrow {
      font-size: 20px;
      color: #b08b5a;
    }

  </style>
</head>

<body>

  <div class="top">
    <!-- 🔁 Make sure this matches your uploaded file -->
    <img src="logo.png" class="logo">

    <div class="tagline">
      RELAX • REJUVINATE • HEAL
    </div>
  </div>

  <div class="welcome">Welcome</div>
  <div class="sub">Choose an option below to connect with us</div>

  <!-- Instagram -->
  <a href="https://www.instagram.com/vasundhara.healing.lounge?igsh=MWNpOGtudHZ5N3RmMw==" class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
      <div class="text">Instagram</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <!-- Google -->
  <a href="https://share.google/Ocm6NvcWWnpt75Lv4" class="card">
    <div class="left">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="icon">
      <div class="text">Google</div>
    </div>
    <div class="arrow">›</div>
  </a>

</body>
</html>
