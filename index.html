<!DOCTYPE html>
<html>
<head>
  <title>Vasundhara Healing Lounge</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: #3b2a1f;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      padding-top: 40px;
      min-height: 100vh;

      /* ✅ IMPORTANT FIX */
      background: url('background.png') no-repeat center center;
      background-size: cover;
    }

    /* ✅ FIXED OVERLAY (lighter + mobile safe) */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(245, 241, 235, 0.6); /* was 0.88 → too strong */
      z-index: -1;
    }

    /* 🔥 Center container (makes UI feel premium) */
    .container {
      width: 100%;
      max-width: 420px;
      padding: 0 15px;
    }

    .logo {
      width: 230px;
      max-width: 85%;
    }

    .tagline {
      letter-spacing: 2px;
      font-size: 13px;
      margin: 15px 0 25px;
      color: #8c6b4f;
    }

    .welcome {
      font-size: 26px;
      margin-top: 5px;
    }

    .sub {
      color: #6e5a4a;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .card {
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border-radius: 16px;

      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);

      display: flex;
      align-items: center;
      justify-content: space-between;

      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;

      transition: 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: scale(1.04);
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 34px;
      margin-right: 12px;
    }

    .text {
      font-size: 16px;
    }

    .arrow {
      font-size: 20px;
      color: #b08b5a;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" class="logo">

    <div class="tagline">
      RELAX • REJUVINATE • HEAL
    </div>

    <div class="welcome">Welcome</div>
    <div class="sub">Choose an option below to connect with us</div>

    <!-- Instagram -->
    <a href="https://www.instagram.com/vasundhara.healing.lounge?igsh=MWNpOGtudHZ5N3RmMw==" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="icon">
        <div class="text">Instagram</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- Google -->
    <a href="https://share.google/Ocm6NvcWWnpt75Lv4" class="card">
      <div class="left">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="icon">
        <div class="text">Google</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

</body>
</html>
